name: Kodi Repo Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Structure and ZIPs
        run: |
          # 1. Siapkan folder output untuk GitHub Pages
          mkdir -p docs/zips
          
          # 2. Proses Addon (script.dns.google.auto)
          ADDON_ID="script.dns.google.auto"
          ADDON_VER=$(grep -oP '(?<=version=")[^"]*' $ADDON_ID/addon.xml | head -1)
          
          echo "📦 Packaging $ADDON_ID v$ADDON_VER"
          cd $ADDON_ID
          zip -r "../$ADDON_ID-$ADDON_VER.zip" . -x "*.git*" "*.pyc" "__pycache__/*"
          cd ..
          
          mkdir -p "docs/zips/$ADDON_ID"
          mv "$ADDON_ID-$ADDON_VER.zip" "docs/zips/$ADDON_ID/"
          cp "$ADDON_ID/addon.xml" "docs/zips/$ADDON_ID/"

          # 3. Proses Repository (repository.dns.google)
          REPO_ID="repository.dns.google"
          # Mengambil versi dari addon.xml di root
          REPO_VER=$(grep -oP '(?<=version=")[^"]*' addon.xml | head -1)
          
          mkdir -p temp_repo
          cp addon.xml icon.png fanart.jpg temp_repo/ 2>/dev/null || true
          
          cd temp_repo
          # Jalur diperbaiki agar tidak No Such File or Directory
          zip -r "../docs/zips/$REPO_ID-$REPO_VER.zip" .
          cd ..
          
          mkdir -p "docs/zips/$REPO_ID"
          cp addon.xml "docs/zips/$REPO_ID/"
          rm -rf temp_repo

      - name: Generate addons.xml & MD5
        run: |
          python3 << 'EOF'
          import os, hashlib
          import xml.etree.ElementTree as ET
          
          zips_path = "docs/zips"
          addons_root = ET.Element("addons")
          
          for root, dirs, files in os.walk(zips_path):
              if "addon.xml" in files:
                  path = os.path.join(root, "addon.xml")
                  try:
                      tree = ET.parse(path)
                      addons_root.append(tree.getroot())
                      print(f"✅ Menambahkan: {path}")
                  except:
                      pass
          
          tree = ET.ElementTree(addons_root)
          if hasattr(ET, 'indent'): ET.indent(tree, space="  ")
          
          xml_out = os.path.join(zips_path, "addons.xml")
          tree.write(xml_out, encoding="UTF-8", xml_declaration=True)
          
          with open(xml_out, "rb") as f:
              md5 = hashlib.md5(f.read()).hexdigest()
          with open(xml_out + ".md5", "w") as f:
              f.write(md5)
          EOF

      - name: Create Index Page (Landing Page)
        run: |
          BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          REPO_URL="${BASE_URL}/zips/"
          
          cat <<EOF > docs/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Google DNS Repo</title>
              <style>
                  body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
                  .card { background: #1e293b; max-width: 500px; margin: 40px auto; padding: 25px; border-radius: 12px; border: 1px solid #334155; }
                  .url { color: #22c55e; font-family: monospace; background: #020617; padding: 12px; border-radius: 6px; margin: 15px 0; word-break: break-all; }
                  li { text-align: left; margin-bottom: 8px; font-size: 0.9em; }
              </style>
          </head>
          <body>
              <div class="card">
                  <h1>Google DNS Repository</h1>
                  <p>Salin URL ini ke File Manager Kodi:</p>
                  <div class="url">$REPO_URL</div>
                  <div style="text-align:left;">
                      <strong>Cara Pasang:</strong>
                      <ol>
                          <li>Settings > File Manager > Add Source.</li>
                          <li>Masukkan URL di atas, beri nama <b>.DNS</b>.</li>
                          <li>Add-ons > Install from zip file > pilih <b>.DNS</b>.</li>
                          <li>Klik <b>repository.dns.google-1.0.0.zip</b>.</li>
                          <li>Install from repository > Google DNS Repo > Services > Google DNS Auto.</li>
                      </ol>
                  </div>
              </div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          git commit -m "🚀 Auto-deploy update [skip ci]" || echo "No changes"
          git push
