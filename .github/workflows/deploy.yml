name: Kodi Repo Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Structure and ZIPs
        run: |
          # 1. Siapkan folder output untuk GitHub Pages
          mkdir -p docs/zips
          
          # 2. Proses Addon (script.dns.google.auto)
          ADDON_ID="script.dns.google.auto"
          if [ -d "$ADDON_ID" ]; then
            ADDON_VER=$(grep -oP '(?<=version=")[^"]*' $ADDON_ID/addon.xml | head -1)
            echo "📦 Packaging $ADDON_ID v$ADDON_VER"
            cd $ADDON_ID
            zip -r "../$ADDON_ID-$ADDON_VER.zip" . -x "*.git*" "*.pyc" "__pycache__/*"
            cd ..
            mkdir -p "docs/zips/$ADDON_ID"
            mv "$ADDON_ID-$ADDON_VER.zip" "docs/zips/$ADDON_ID/"
            cp "$ADDON_ID/addon.xml" "docs/zips/$ADDON_ID/"
          fi

          # 3. Proses Repository (repository.dns.google)
          REPO_ID="repository.dns.google"
          REPO_VER=$(grep -oP '(?<=version=")[^"]*' addon.xml | head -1)
          
          mkdir -p temp_repo
          cp addon.xml icon.png fanart.jpg temp_repo/ 2>/dev/null || true
          
          cd temp_repo
          zip -r "../docs/zips/$REPO_ID-$REPO_VER.zip" .
          cd ..
          
          mkdir -p "docs/zips/$REPO_ID"
          cp addon.xml "docs/zips/$REPO_ID/"
          rm -rf temp_repo

      - name: Generate addons.xml & MD5
        run: |
          python3 << 'EOF'
          import os, hashlib
          import xml.etree.ElementTree as ET
          
          zips_path = "docs/zips"
          addons_root = ET.Element("addons")
          
          for root, dirs, files in os.walk(zips_path):
              if "addon.xml" in files:
                  path = os.path.join(root, "addon.xml")
                  try:
                      tree = ET.parse(path)
                      addons_root.append(tree.getroot())
                  except:
                      pass
          
          tree = ET.ElementTree(addons_root)
          if hasattr(ET, 'indent'): ET.indent(tree, space="  ")
          
          xml_out = os.path.join(zips_path, "addons.xml")
          tree.write(xml_out, encoding="UTF-8", xml_declaration=True)
          
          with open(xml_out, "rb") as f:
              md5 = hashlib.md5(f.read()).hexdigest()
          with open(xml_out + ".md5", "w") as f:
              f.write(md5)
          EOF

      - name: Create Index Page (Team-Crew Style)
        run: |
          BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          REPO_URL="${BASE_URL}/zips/"
          
          cat <<EOF > docs/index.html
          <!DOCTYPE html>
          <html lang="id">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Google DNS Repository</title>
              <style>
                  :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --text: #f1f5f9; --accent: #22c55e; }
                  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
                  .container { width: 90%; max-width: 500px; background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); border: 1px solid #334155; text-align: center; }
                  h1 { font-size: 1.8rem; margin: 10px 0; color: var(--primary); }
                  .url-container { background: #020617; padding: 15px; border-radius: 12px; margin: 25px 0; border: 1px dashed var(--primary); }
                  .url-text { font-family: monospace; color: var(--accent); font-size: 1rem; word-break: break-all; }
                  .guide { text-align: left; background: rgba(15, 23, 42, 0.5); padding: 20px; border-radius: 16px; border: 1px solid #334155; }
                  ol { padding-left: 20px; color: #cbd5e1; font-size: 0.9rem; }
                  li { margin-bottom: 10px; }
              </style>
          </head>
          <body>
              <div class="container">
                  <img src="${BASE_URL}/icon.png" width="100" style="border-radius:20px" onerror="this.src='https://kodi.tv/assets/images/kodi-logo.png'">
                  <h1>Google DNS Repo</h1>
                  <p>Alamat sumber resmi untuk plugin Auto-Switch Google DNS Kodi.</p>
                  <div class="url-container"><div class="url-text">${REPO_URL}</div></div>
                  <div class="guide">
                      <strong>Panduan Cepat:</strong>
                      <ol>
                          <li>Settings > File Manager > Add Source.</li>
                          <li>Masukkan URL hijau di atas, beri nama <b>.DNS</b>.</li>
                          <li>Add-ons > Install from zip file > <b>.DNS</b>.</li>
                          <li>Pilih <b>repository.dns.google-x.x.x.zip</b>.</li>
                      </ol>
                  </div>
              </div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          git commit -m "🚀 Auto-deploy update [skip ci]" || echo "No changes"
          git push
