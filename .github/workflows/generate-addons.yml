name: Generate addons.xml

# Trigger: Jalan otomatis saat ada push ke branch main
on:
  push:
    branches:
      - main
    paths:
      - 'zips/**'
      - 'script.dns.google.auto/**'
      - 'addon.xml'
  workflow_dispatch:  # Bisa trigger manual dari GitHub

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # Step 3: Generate addons.xml
      - name: Generate addons.xml
        run: |
          python3 _generator.py
      
      # Step 4: Commit & Push changes
      - name: Commit Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add zips/addons.xml zips/addons.xml.md5
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-generate addons.xml [skip ci]"
          git push
