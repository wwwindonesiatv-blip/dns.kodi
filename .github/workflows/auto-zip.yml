name: Auto-Zip and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'script.dns.google.auto/**'
      - 'addon.xml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # Extract versions
      - name: Extract Addon Version
        id: addon_version
        run: |
          VERSION=$(python3 << 'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse('script.dns.google.auto/addon.xml')
          print(tree.getroot().get('version'), end='')
          EOF
          )
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Addon version: $VERSION"
      
      - name: Extract Repository Version
        id: repo_version
        run: |
          VERSION=$(python3 << 'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse('addon.xml')
          print(tree.getroot().get('version'), end='')
          EOF
          )
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Repository version: $VERSION"
      
      # Create ZIPs
      - name: Create Addon ZIP
        run: |
          VERSION="${{ steps.addon_version.outputs.version }}"
          cd script.dns.google.auto
          zip -r ../script.dns.google.auto-${VERSION}.zip . -x "*.pyc" -x "__pycache__/*" -x ".git/*"
          cd ..
          mkdir -p zips/script.dns.google.auto
          mv script.dns.google.auto-${VERSION}.zip zips/script.dns.google.auto/
          cp script.dns.google.auto/addon.xml zips/script.dns.google.auto/
      
      - name: Create Repository ZIP
        run: |
          VERSION="${{ steps.repo_version.outputs.version }}"
          mkdir -p temp_repo
          cp addon.xml temp_repo/
          cp icon.png temp_repo/ 2>/dev/null || true
          cp fanart.jpg temp_repo/ 2>/dev/null || true
          cd temp_repo
          zip -r ../repository.dns.kodi-${VERSION}.zip .
          cd ..
          mkdir -p zips/repository.dns.kodi
          cp repository.dns.kodi-${VERSION}.zip zips/repository.dns.kodi/
          cp repository.dns.kodi-${VERSION}.zip ./
          cp addon.xml zips/repository.dns.kodi/
          rm -rf temp_repo
      
      # ========================================
      # GENERATE addons.xml + MD5
      # ========================================
      - name: Generate addons.xml and MD5
        run: |
          python3 << 'PYTHON_SCRIPT'
import xml.etree.ElementTree as ET
from pathlib import Path
import hashlib

print("=" * 60)
print("  Generating addons.xml and MD5 checksum")
print("=" * 60)

# Create root element
addons_xml = ET.Element('addons')

# Scan zips folder
zips_path = Path('zips')
addons_found = 0

for addon_folder in sorted(zips_path.iterdir()):
    if not addon_folder.is_dir():
        continue
    
    addon_xml_path = addon_folder / 'addon.xml'
    
    if addon_xml_path.exists():
        print(f"\n📦 Found: {addon_folder.name}")
        tree = ET.parse(addon_xml_path)
        addon = tree.getroot()
        
        # Get addon info
        addon_id = addon.get('id')
        addon_version = addon.get('version')
        addon_name = addon.get('name')
        
        print(f"   ID: {addon_id}")
        print(f"   Name: {addon_name}")
        print(f"   Version: {addon_version}")
        
        addons_xml.append(addon)
        addons_found += 1

# Save addons.xml
tree = ET.ElementTree(addons_xml)
ET.indent(tree, space="    ")
addons_xml_path = zips_path / 'addons.xml'
tree.write(addons_xml_path, encoding='UTF-8', xml_declaration=True)

print(f"\n✅ addons.xml generated")
print(f"   Location: {addons_xml_path}")
print(f"   Total addons: {addons_found}")

# ========================================
# GENERATE MD5 CHECKSUM
# ========================================
print("\n🔐 Generating MD5 checksum...")

with open(addons_xml_path, 'rb') as f:
    content = f.read()
    md5_hash = hashlib.md5(content).hexdigest()

md5_path = zips_path / 'addons.xml.md5'
with open(md5_path, 'w') as f:
    f.write(md5_hash)

print(f"✅ MD5 checksum generated")
print(f"   Location: {md5_path}")
print(f"   MD5: {md5_hash}")

print("\n" + "=" * 60)
print("✅ Generation completed successfully!")
print("=" * 60)
PYTHON_SCRIPT
      
      # Commit changes
      - name: Commit and Push Changes
        run: |
          ADDON_VER="${{ steps.addon_version.outputs.version }}"
          REPO_VER="${{ steps.repo_version.outputs.version }}"
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add zips/
          git add repository.dns.kodi-*.zip
          
          if git diff --staged --quiet; then
            echo "ℹ️  No changes to commit"
          else
            git commit -m "🤖 Auto-update release files

Addon: v${ADDON_VER}
Repository: v${REPO_VER}

Files updated:
- addons.xml (regenerated)
- addons.xml.md5 (auto-generated) ✅
- addon ZIPs
- repository ZIP (root)

[skip ci]"
            git push
            echo "✅ Changes committed and pushed"
          fi
      
      # Summary
      - name: Workflow Summary
        run: |
          echo "================================================"
          echo "  AUTO-ZIP AND DEPLOY SUMMARY"
          echo "================================================"
          echo ""
          echo "📦 Addon: v${{ steps.addon_version.outputs.version }}"
          echo "📦 Repository: v${{ steps.repo_version.outputs.version }}"
          echo ""
          echo "✅ addons.xml: Generated"
          echo "✅ addons.xml.md5: Generated"
          echo ""
          cat zips/addons.xml.md5
          echo ""
          echo "================================================"