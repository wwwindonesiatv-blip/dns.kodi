name: Auto-Zip Addon

on:
  push:
    branches:
      - main
    paths:
      - 'script.dns.google.auto/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-zip:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Extract Version
        id: version
        run: |
          VERSION=$(python3 << 'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse('script.dns.google.auto/addon.xml')
          print(tree.getroot().get('version'), end='')
          EOF
          )
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"
      
      - name: Create ZIP
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          cd script.dns.google.auto
          zip -r ../script.dns.google.auto-${VERSION}.zip . -x "*.pyc" -x "__pycache__/*" -x ".git/*" -x "*.md"
          cd ..
          
          mkdir -p zips/script.dns.google.auto
          mv script.dns.google.auto-${VERSION}.zip zips/script.dns.google.auto/
          cp script.dns.google.auto/addon.xml zips/script.dns.google.auto/
          
          echo "✅ ZIP created: script.dns.google.auto-${VERSION}.zip"
      
      - name: Commit and Push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add zips/script.dns.google.auto/*
          
          if git diff --staged --quiet; then
            echo "ℹ️  No changes to commit"
          else
            git commit -m "🤖 Auto-zip addon v${VERSION} [skip ci]"
            git push
            echo "✅ Committed and pushed"
          fi
