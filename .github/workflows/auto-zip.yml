name: Auto-Zip and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'script.dns.google.auto/**'
      - 'addon.xml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Extract Addon Version
        id: addon_version
        run: |
          VERSION=$(python3 << 'EOF'
          import xml.etree.ElementTree as ET
          try:
              tree = ET.parse('script.dns.google.auto/addon.xml')
              print(tree.getroot().get('version'), end='')
          except:
              print('0.0.1', end='')
          EOF
          )
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Extract Repository Version
        id: repo_version
        run: |
          VERSION=$(python3 << 'EOF'
          import xml.etree.ElementTree as ET
          try:
              tree = ET.parse('addon.xml')
              print(tree.getroot().get('version'), end='')
          except:
              print('0.0.1', end='')
          EOF
          )
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Addon ZIP
        run: |
          VERSION="${{ steps.addon_version.outputs.version }}"
          mkdir -p zips/script.dns.google.auto
          cd script.dns.google.auto
          zip -r ../script.dns.google.auto-${VERSION}.zip . -x "*.pyc" -x "__pycache__/*" -x ".git/*"
          cd ..
          mv script.dns.google.auto-${VERSION}.zip zips/script.dns.google.auto/
          cp script.dns.google.auto/addon.xml zips/script.dns.google.auto/
      
      - name: Create Repository ZIP
        run: |
          VERSION="${{ steps.repo_version.outputs.version }}"
          ZIP_NAME="repository.dns.kodi-${VERSION}.zip"
          mkdir -p temp_repo
          cp addon.xml temp_repo/
          cp icon.png temp_repo/ 2>/dev/null || true
          cp fanart.jpg temp_repo/ 2>/dev/null || true
          
          cd temp_repo
          zip -r "../$ZIP_NAME" .
          cd ..
          
          mkdir -p zips/repository.dns.kodi
          # Gunakan 'cp -u' (update) untuk skip jika file sama/identik
          cp -u "$ZIP_NAME" zips/repository.dns.kodi/ 2>/dev/null || true
          cp -u addon.xml zips/repository.dns.kodi/ 2>/dev/null || true
          
          # Hapus temp agar bersih
          rm -rf temp_repo
      
      - name: Generate addons.xml and MD5
        run: |
          python3 << 'PYTHON_SCRIPT'
          import xml.etree.ElementTree as ET
          from pathlib import Path
          import hashlib

          addons_xml = ET.Element('addons')
          zips_path = Path('zips')
          
          if not zips_path.exists():
              zips_path.mkdir()

          for addon_folder in sorted(zips_path.iterdir()):
              if addon_folder.is_dir():
                  xml_file = addon_folder / 'addon.xml'
                  if xml_file.exists():
                      tree = ET.parse(xml_file)
                      addons_xml.append(tree.getroot())

          tree = ET.ElementTree(addons_xml)
          if hasattr(ET, 'indent'): ET.indent(tree, space="    ")
          
          out_path = zips_path / 'addons.xml'
          tree.write(out_path, encoding='UTF-8', xml_declaration=True)
          
          with open(out_path, 'rb') as f:
              m = hashlib.md5(f.read()).hexdigest()
          with open(str(out_path) + '.md5', 'w') as f:
              f.write(m)
          PYTHON_SCRIPT
      
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add zips/
          git add repository.dns.kodi-*.zip 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
          else
            git commit -m "🤖 Auto-update release files [skip ci]"
            git push
            echo "✅ Changes committed and pushed"
          fi
