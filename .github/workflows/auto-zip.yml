name: Auto-Zip Addon

on:
  push:
    branches:
      - main
    paths:
      - 'script.dns.google.auto/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  zip:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get Version (Python XML Parser)
        id: version
        run: |
          # Check if addon.xml exists
          if [ ! -f "script.dns.google.auto/addon.xml" ]; then
            echo "❌ Error: addon.xml not found!"
            exit 1
          fi
          
          # Extract version using Python XML parser (SAFE!)
          VERSION=$(python3 << 'EOF'
import xml.etree.ElementTree as ET
try:
    tree = ET.parse('script.dns.google.auto/addon.xml')
    root = tree.getroot()
    version = root.get('version')
    if version:
        print(version, end='')
    else:
        print("ERROR: No version attribute found", file=sys.stderr)
        exit(1)
except Exception as e:
    print(f"ERROR: {e}", file=sys.stderr)
    exit(1)
EOF
          )
          
          # Validate version format
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Error: Invalid version format: $VERSION"
            echo "   Expected format: X.Y.Z (e.g., 1.0.0)"
            exit 1
          fi
          
          # Set output
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Addon version: $VERSION"
      
      - name: Verify Version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "✅ Version detected: $VERSION"
          
          if [ -z "$VERSION" ]; then
            echo "❌ Error: Version is empty!"
            exit 1
          fi
      
      - name: Create ZIP
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          echo "Creating ZIP for version $VERSION..."
          
          cd script.dns.google.auto
          zip -r ../script.dns.google.auto-${VERSION}.zip . -x "*.pyc" -x "__pycache__/*" -x ".git/*"
          cd ..
          
          # Create zips folder structure
          mkdir -p zips/script.dns.google.auto
          
          # Move ZIP
          mv script.dns.google.auto-${VERSION}.zip zips/script.dns.google.auto/
          
          # Copy addon.xml
          cp script.dns.google.auto/addon.xml zips/script.dns.google.auto/
          
          echo "✅ ZIP created: script.dns.google.auto-${VERSION}.zip"
          ls -lh zips/script.dns.google.auto/
      
      - name: Commit ZIP
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add zips/script.dns.google.auto/*
          
          if git diff --staged --quiet; then
            echo "ℹ️  No changes to commit"
          else
            git commit -m "🤖 Auto-zip addon v${VERSION} [skip ci]"
            git push
            echo "✅ Changes committed and pushed"
          fi
