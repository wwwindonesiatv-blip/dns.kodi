name: Auto-Zip Addon

on:
  push:
    paths:
      - 'script.dns.google.auto/**'

jobs:
  zip:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Get Version
        id: version
        run: |
          VERSION=$(grep -oP 'version="\K[^"]+' script.dns.google.auto/addon.xml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create ZIP
        run: |
          cd script.dns.google.auto
          zip -r ../script.dns.google.auto-${{ steps.version.outputs.version }}.zip .
          cd ..
          
          mkdir -p zips/script.dns.google.auto
          mv script.dns.google.auto-${{ steps.version.outputs.version }}.zip zips/script.dns.google.auto/
          cp script.dns.google.auto/addon.xml zips/script.dns.google.auto/
      
      - name: Commit ZIP
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add zips/script.dns.google.auto/*
          git commit -m "🤖 Auto-zip addon v${{ steps.version.outputs.version }} [skip ci]"
          git push
